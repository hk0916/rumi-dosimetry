services:
  db:
    image: mysql:8.0
    container_name: dosimetry-db
    restart: unless-stopped
    env_file: .env
    ports:
      - "3306:3306"
    environment:
      - TZ=Asia/Seoul
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: dosimetry-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "5102:4000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - TZ=Asia/Seoul
    command: sh -c "npx prisma db push --accept-data-loss && npm run dev"

  frontend:
    build: ./frontend
    container_name: dosimetry-frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://49.50.139.85:5102
    command: npm run dev
